# T-Max configuration: three vertical panes (30% | 40% | 30%)

# Create a new session with three vertical panes
new-session -s main

# Split into left (30%) and right (70%)
split-window -h -p 70

# Split the right pane into center (57%) and right (43%)
# 40/70 ≈ 57%, leaving 30/70 ≈ 43% for the rightmost pane
split-window -h -p 43

# Select the left pane as the starting pane
select-pane -t 0
